<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Expense Manager</title>

    <!-- Firebase COMPAT scripts — must be in <head> with no defer/async -->
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .hidden {
            display: none !important;
        }

        /* ============ AUTH PAGE ============ */
        .auth-page {
            background: white;
            border-radius: 15px;
            padding: 30px;
            max-width: 400px;
            margin: 50px auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .auth-page h2 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
            grid-column: 1 / -1;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .toggle-auth {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .toggle-auth a {
            color: #667eea;
            cursor: pointer;
            text-decoration: underline;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }

        .success-message {
            background: #efe;
            color: #3c3;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }

        /* ============ HOME PAGE ============ */
        .home-page {
            padding: 20px 0;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #333;
            font-size: 24px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-info p {
            color: #666;
            font-size: 14px;
        }

        .family-code {
            background: #667eea;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .btn-logout {
            background: #ff6b6b;
            color: white;
            padding: 10px 20px;
        }

        .btn-logout:hover {
            background: #ff5252;
        }

        /* ============ DASHBOARD ============ */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .stat-card.income {
            border-top: 5px solid #4caf50;
        }

        .stat-card.expense {
            border-top: 5px solid #ff6b6b;
        }

        .stat-card.balance {
            border-top: 5px solid #667eea;
        }

        .stat-label {
            color: #999;
            font-size: 14px;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #333;
        }

        /* ============ TABS ============ */
        .tabs {
            background: white;
            border-radius: 15px 15px 0 0;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .tab-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            background: #f5f5f5;
        }

        .tab-button {
            padding: 15px;
            border: none;
            background: none;
            cursor: pointer;
            font-weight: 600;
            color: #999;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab-button.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            padding: 25px;
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* ============ ADD TRANSACTION ============ */
        .transaction-form {
            display: grid;
            gap: 15px;
        }

        .type-toggle {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .type-btn {
            padding: 12px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .type-btn.income.active {
            border-color: #4caf50;
            background: #e8f5e9;
            color: #4caf50;
        }

        .type-btn.expense.active {
            border-color: #ff6b6b;
            background: #ffebee;
            color: #ff6b6b;
        }

        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            resize: vertical;
            min-height: 60px;
        }

        /* ============ TRANSACTIONS LIST ============ */
        .transactions-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .transaction-item {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #667eea;
            transition: all 0.3s;
        }

        .transaction-item:hover {
            background: #f0f0f0;
            transform: translateX(5px);
        }

        .transaction-item.income {
            border-left-color: #4caf50;
        }

        .transaction-item.expense {
            border-left-color: #ff6b6b;
        }

        .transaction-info h4 {
            color: #333;
            margin-bottom: 5px;
        }

        .transaction-info p {
            color: #999;
            font-size: 12px;
        }

        .transaction-amount {
            font-weight: bold;
            font-size: 16px;
        }

        .transaction-amount.income {
            color: #4caf50;
        }

        .transaction-amount.expense {
            color: #ff6b6b;
        }

        /* ============ REPORTS ============ */
        .reports-grid {
            display: grid;
            gap: 20px;
        }

        .report-section h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .category-item {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .category-name {
            font-weight: 600;
            color: #333;
        }

        .category-amount {
            font-weight: 600;
            color: #667eea;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state p {
            margin: 10px 0;
            font-size: 16px;
        }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }

            .tab-buttons {
                grid-template-columns: 1fr;
            }

            .stat-card .stat-value {
                font-size: 24px;
            }

            .transaction-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- AUTH PAGE -->
    <div id="authPage" class="auth-page">
        <h2 id="authTitle">Sign In</h2>
        <div id="errorMsg" class="error-message"></div>
        <div id="successMsg" class="success-message"></div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="your@email.com">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <div id="familyCodeGroup" class="form-group hidden">
            <label>Family Code (leave blank to create new)</label>
            <input type="text" id="familyCode" placeholder="Enter existing code or leave blank">
        </div>

        <div class="button-group">
            <button class="btn-primary" id="authBtn">Sign In</button>
            <button class="btn-secondary" id="toggleBtn">Sign Up</button>
        </div>

        <div class="toggle-auth">
            <p id="toggleText">Need account? <a id="toggleLink" onclick="toggleAuthMode()">Sign Up</a></p>
        </div>
    </div>

    <!-- HOME PAGE -->
    <div id="homePage" class="home-page hidden">
        <div class="container">
            <div class="header">
                <h1>Family Expense Manager</h1>
                <div class="user-info">
                    <div>
                        <p>Logged in as: <strong id="userEmail"></strong></p>
                        <div class="family-code" id="familyCodeDisplay"></div>
                    </div>
                    <button class="btn-logout" onclick="logout()">Logout</button>
                </div>
            </div>

            <!-- Dashboard Stats -->
            <div class="dashboard">
                <div class="stat-card income">
                    <div class="stat-label">Total Income</div>
                    <div class="stat-value" id="totalIncome">₹0</div>
                </div>
                <div class="stat-card expense">
                    <div class="stat-label">Total Expense</div>
                    <div class="stat-value" id="totalExpense">₹0</div>
                </div>
                <div class="stat-card balance">
                    <div class="stat-label">Balance</div>
                    <div class="stat-value" id="balance">₹0</div>
                </div>
            </div>

            <!-- Tabs -->
            <div class="tabs">
                <div class="tab-buttons">
                    <button class="tab-button active" onclick="switchTab(0)">📊 Dashboard</button>
                    <button class="tab-button" onclick="switchTab(1)">➕ Add Transaction</button>
                    <button class="tab-button" onclick="switchTab(2)">📈 Reports</button>
                </div>

                <!-- Tab 1: Dashboard -->
                <div class="tab-content active">
                    <h3>Recent Transactions</h3>
                    <div id="recentTransactions" class="transactions-list"></div>
                </div>

                <!-- Tab 2: Add Transaction -->
                <div class="tab-content">
                    <div class="transaction-form">
                        <div class="type-toggle">
                            <button class="type-btn income active" onclick="setType('income')">💰 Income</button>
                            <button class="type-btn expense" onclick="setType('expense')">💸 Expense</button>
                        </div>

                        <div class="form-group">
                            <label>Amount (₹)</label>
                            <input type="number" id="amount" placeholder="0" step="0.01">
                        </div>

                        <div class="form-group">
                            <label>Category</label>
                            <select id="category">
                                <option value="Salary">💼 Salary</option>
                                <option value="Bonus">🎁 Bonus</option>
                                <option value="Gift">🎀 Gift</option>
                                <option value="Investment">📈 Investment</option>
                                <option value="Other">📌 Other</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Description (optional)</label>
                            <textarea id="description" placeholder="Add details..."></textarea>
                        </div>

                        <button class="btn-primary" onclick="addTransaction()" style="grid-column: 1 / -1;">Add Transaction</button>
                    </div>
                </div>

                <!-- Tab 3: Reports -->
                <div class="tab-content">
                    <div class="reports-grid">
                        <div class="report-section">
                            <h3>💸 Expense Breakdown</h3>
                            <div id="expenseReport"></div>
                        </div>
                        <div class="report-section">
                            <h3>💰 Income Breakdown</h3>
                            <div id="incomeReport"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>



    <script>
    document.addEventListener('DOMContentLoaded', function () {
        // ============ FIREBASE CONFIG ============
        const firebaseConfig = {
            apiKey: "AIzaSyBEbRDWwP81F8vgZh6juCYIt0zJZx60U5E",
            authDomain: "familyexpensemanager-18fa4.firebaseapp.com",
            databaseURL: "https://familyexpensemanager-18fa4-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "familyexpensemanager-18fa4",
            storageBucket: "familyexpensemanager-18fa4.firebasestorage.app",
            messagingSenderId: "1071414754492",
            appId: "1:1071414754492:web:12f3b6641df06f7d4ee4b9"
        };

        // ✅ FIX 2: Only ONE initializeApp call, using the compat style
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // ============ STATE ============
        let currentUser = null;
        let familyCode = null;
        let isSignUp = false;
        let currentType = 'income';
        let realtimeListenerRef = null;

        // ============ AUTHENTICATION ============
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                loadFamilyCode();
                showPage('home');
            } else {
                currentUser = null;
                familyCode = null;
                if (realtimeListenerRef) {
                    realtimeListenerRef.off();
                    realtimeListenerRef = null;
                }
                showPage('auth');
            }
        });

        function toggleAuthMode() {
            isSignUp = !isSignUp;
            document.getElementById('authTitle').textContent = isSignUp ? 'Create Account' : 'Sign In';
            document.getElementById('authBtn').textContent = isSignUp ? 'Sign Up' : 'Sign In';
            document.getElementById('familyCodeGroup').classList.toggle('hidden', !isSignUp);
            document.getElementById('toggleText').innerHTML = isSignUp
                ? 'Have account? <a onclick="toggleAuthMode()">Sign In</a>'
                : 'Need account? <a onclick="toggleAuthMode()">Sign Up</a>';
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('successMsg').style.display = 'none';
        }

        async function authenticate() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMsg');
            const successDiv = document.getElementById('successMsg');

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            if (!email || !password) {
                showError(errorDiv, 'Please fill all fields');
                return;
            }

            try {
                if (isSignUp) {
                    const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                    const uid = userCredential.user.uid;

                    const enteredCode = document.getElementById('familyCode').value.trim();
                    const newFamilyCode = enteredCode || generateFamilyCode();

                    await db.ref(`users/${uid}`).set({
                        email: email,
                        familyCode: newFamilyCode,
                        createdAt: new Date().toISOString()
                    });

                    await db.ref(`families/${newFamilyCode}`).set({
                        code: newFamilyCode,
                        createdAt: new Date().toISOString()
                    });

                    showSuccess(successDiv, `Account created! Your Family Code: ${newFamilyCode}`);
                } else {
                    await auth.signInWithEmailAndPassword(email, password);
                }
            } catch (error) {
                showError(errorDiv, error.message);
            }
        }

        async function logout() {
            await auth.signOut();
        }

        function generateFamilyCode() {
            return Math.random().toString(36).substring(2, 12).toUpperCase();
        }

        function loadFamilyCode() {
            db.ref(`users/${currentUser.uid}`).once('value', (snap) => {
                if (snap.val()) {
                    familyCode = snap.val().familyCode;
                    document.getElementById('userEmail').textContent = currentUser.email;
                    document.getElementById('familyCodeDisplay').textContent = `Family Code: ${familyCode}`;
                    loadData();
                    setupRealtimeListener();
                }
            });
        }

        // ============ PAGE MANAGEMENT ============
        function showPage(page) {
            document.getElementById('authPage').classList.toggle('hidden', page !== 'auth');
            document.getElementById('homePage').classList.toggle('hidden', page !== 'home');
        }

        function switchTab(index) {
            document.querySelectorAll('.tab-button').forEach((btn, i) => {
                btn.classList.toggle('active', i === index);
            });
            document.querySelectorAll('.tab-content').forEach((content, i) => {
                content.classList.toggle('active', i === index);
            });
        }

        // ============ TRANSACTIONS ============
        function setType(type) {
            currentType = type;
            document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.type-btn.${type}`).classList.add('active');

            const categorySelect = document.getElementById('category');
            if (type === 'income') {
                categorySelect.innerHTML = `
                    <option value="Salary">💼 Salary</option>
                    <option value="Bonus">🎁 Bonus</option>
                    <option value="Gift">🎀 Gift</option>
                    <option value="Investment">📈 Investment</option>
                    <option value="Other">📌 Other</option>
                `;
            } else {
                categorySelect.innerHTML = `
                    <option value="Food">🍔 Food</option>
                    <option value="Transport">🚗 Transport</option>
                    <option value="Utilities">💡 Utilities</option>
                    <option value="Entertainment">🎬 Entertainment</option>
                    <option value="Medical">⚕️ Medical</option>
                    <option value="Shopping">🛍️ Shopping</option>
                    <option value="Education">📚 Education</option>
                    <option value="Other">📌 Other</option>
                `;
            }
        }

        async function addTransaction() {
            const amount = parseFloat(document.getElementById('amount').value);
            const category = document.getElementById('category').value;
            const description = document.getElementById('description').value;

            if (!amount || amount <= 0) {
                alert('Please enter a valid amount');
                return;
            }

            if (!familyCode) {
                alert('Family code not loaded yet. Please wait.');
                return;
            }

            const transactionRef = db.ref(`families/${familyCode}/transactions`).push();
            const transactionId = transactionRef.key;

            const transaction = {
                id: transactionId,
                type: currentType,
                amount: amount,
                category: category,
                description: description,
                userId: currentUser.uid,
                userEmail: currentUser.email,
                date: new Date().toISOString()
            };

            try {
                await transactionRef.set(transaction);
                document.getElementById('amount').value = '';
                document.getElementById('description').value = '';
                alert('Transaction added successfully!');
            } catch (error) {
                alert('Error adding transaction: ' + error.message);
            }
        }

        // ============ DATA LOADING ============
        function loadData() {
            if (!familyCode) return;

            db.ref(`families/${familyCode}/transactions`).once('value', (snap) => {
                const transactions = snap.val() || {};
                updateDashboard(transactions);
                updateRecentTransactions(transactions);
                updateReports(transactions);
            });
        }

        function setupRealtimeListener() {
            if (!familyCode) return;

            // Remove old listener if exists
            if (realtimeListenerRef) {
                realtimeListenerRef.off();
            }

            realtimeListenerRef = db.ref(`families/${familyCode}/transactions`);
            realtimeListenerRef.on('value', (snap) => {
                const transactions = snap.val() || {};
                updateDashboard(transactions);
                updateRecentTransactions(transactions);
                updateReports(transactions);
            });
        }

        function updateDashboard(transactions) {
            let totalIncome = 0;
            let totalExpense = 0;

            Object.values(transactions).forEach(t => {
                if (t.type === 'income') totalIncome += t.amount;
                else totalExpense += t.amount;
            });

            const balance = totalIncome - totalExpense;

            document.getElementById('totalIncome').textContent = '₹' + totalIncome.toLocaleString('en-IN', { maximumFractionDigits: 2 });
            document.getElementById('totalExpense').textContent = '₹' + totalExpense.toLocaleString('en-IN', { maximumFractionDigits: 2 });
            document.getElementById('balance').textContent = '₹' + balance.toLocaleString('en-IN', { maximumFractionDigits: 2 });
        }

        function updateRecentTransactions(transactions) {
            const sorted = Object.values(transactions)
                .sort((a, b) => new Date(b.date) - new Date(a.date))
                .slice(0, 10);

            const container = document.getElementById('recentTransactions');

            if (sorted.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>No transactions yet</p></div>';
                return;
            }

            container.innerHTML = sorted.map(t => {
                const date = new Date(t.date).toLocaleDateString('en-IN');
                const icon = t.type === 'income' ? '📈' : '📉';
                const sign = t.type === 'income' ? '+' : '-';
                return `
                    <div class="transaction-item ${t.type}">
                        <div class="transaction-info">
                            <h4>${icon} ${t.category}</h4>
                            <p>${date} · by ${t.userEmail.split('@')[0]}${t.description ? ' · ' + t.description : ''}</p>
                        </div>
                        <div class="transaction-amount ${t.type}">
                            ${sign}₹${t.amount.toLocaleString('en-IN', { maximumFractionDigits: 2 })}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateReports(transactions) {
            const expenses = {};
            const incomes = {};

            Object.values(transactions).forEach(t => {
                if (t.type === 'expense') {
                    expenses[t.category] = (expenses[t.category] || 0) + t.amount;
                } else {
                    incomes[t.category] = (incomes[t.category] || 0) + t.amount;
                }
            });

            const totalExpense = Object.values(expenses).reduce((a, b) => a + b, 0);
            const expenseHTML = Object.entries(expenses).map(([category, amount]) => {
                const percentage = totalExpense > 0 ? (amount / totalExpense * 100) : 0;
                return `
                    <div class="category-item">
                        <div class="category-header">
                            <span class="category-name">${category}</span>
                            <span class="category-amount">₹${amount.toLocaleString('en-IN', { maximumFractionDigits: 2 })} (${percentage.toFixed(1)}%)</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${percentage}%; background: #ff6b6b;"></div>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('expenseReport').innerHTML = expenseHTML || '<p class="empty-state">No expenses yet</p>';

            const totalIncome = Object.values(incomes).reduce((a, b) => a + b, 0);
            const incomeHTML = Object.entries(incomes).map(([category, amount]) => {
                const percentage = totalIncome > 0 ? (amount / totalIncome * 100) : 0;
                return `
                    <div class="category-item">
                        <div class="category-header">
                            <span class="category-name">${category}</span>
                            <span class="category-amount">₹${amount.toLocaleString('en-IN', { maximumFractionDigits: 2 })} (${percentage.toFixed(1)}%)</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${percentage}%; background: #4caf50;"></div>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('incomeReport').innerHTML = incomeHTML || '<p class="empty-state">No income yet</p>';
        }

        // ============ UI HELPERS ============
        function showError(element, message) {
            element.textContent = message;
            element.style.display = 'block';
        }

        function showSuccess(element, message) {
            element.textContent = message;
            element.style.display = 'block';
        }

        // ============ EVENT LISTENERS ============
        document.getElementById('authBtn').addEventListener('click', authenticate);
        document.getElementById('toggleBtn').addEventListener('click', toggleAuthMode);
        document.getElementById('email').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') authenticate();
        });
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') authenticate();
        });

        // Expose functions called from inline HTML onclick handlers
        window.logout = logout;
        window.toggleAuthMode = toggleAuthMode;
        window.switchTab = switchTab;
        window.setType = setType;
        window.addTransaction = addTransaction;
    }); // end DOMContentLoaded
    </script>
</body>
</html>
